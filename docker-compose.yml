services:
  coms-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coms-backend
    restart: unless-stopped
    env_file:
      - /etc/coms/backend.env
    environment:
      SERVER_PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /opt/coms/backend-data:/app/data
