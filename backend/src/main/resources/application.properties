spring.application.name=backend

# H2 File-based Database (data persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/comsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (dev only — visit http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=coms-super-secret-key-2024-please-change-in-production-minimum-256-bits!!
jwt.expiration=86400000
