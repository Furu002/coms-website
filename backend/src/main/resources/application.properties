spring.application.name=backend

# H2 File-based Database
spring.datasource.url=jdbc:h2:file:./data/comsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (dev only — disable in production: H2_CONSOLE_ENABLED=false)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JWT — set JWT_SECRET env var in production (min 32 chars)
jwt.secret=${JWT_SECRET:coms-dev-secret-key-change-in-production-min-32chars!!}
jwt.expiration=86400000

# Cookie
cookie.secure=${COOKIE_SECURE:false}

# Actuator — expose only health and info
management.endpoints.web.exposure.include=health,info
