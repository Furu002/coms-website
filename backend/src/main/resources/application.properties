spring.application.name=backend

# H2 File-based Database
spring.datasource.url=jdbc:h2:file:./data/comsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway -- production profile enables migrations
spring.flyway.enabled=false

# H2 Console — disabled by default; set H2_CONSOLE_ENABLED=true only in dev
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JWT — required; no default. Set JWT_SECRET env var (min 32 chars)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Cookie — secure by default (requires HTTPS); dev profile overrides
cookie.secure=${COOKIE_SECURE:true}

# Actuator
management.endpoints.web.exposure.include=health,info

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Local archive storage
storage.location=./uploads
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
